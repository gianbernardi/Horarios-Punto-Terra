<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Quién está hoy?</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F4F1EC;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.15);
    --text-primary: #1A1A18;
    --text-secondary: #6B6B67;
    --text-tertiary: #A8A8A4;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    max-width: 680px;
    margin: 0 auto 16px;
  }

  /* ── NOW CARD ── */
  .now-card { padding: 24px; }

  .now-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .now-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-tertiary);
  }

  .now-datetime {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .now-people {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    min-height: 72px;
    align-items: center;
  }

  .avatar { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .avatar-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
  .avatar-name { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .now-empty { color: var(--text-tertiary); font-size: 14px; }

  /* ── CHATBOT ── */
  .chat-card { padding: 0; overflow: hidden; }

  .chat-header {
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .chat-header-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #9FE1CB;
    animation: pulse 2s ease-in-out infinite;
  }

  .chat-header-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .chat-header-sub {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-left: auto;
  }

  .chat-messages {
    height: 240px;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.bot {
    background: var(--bg);
    color: var(--text-primary);
    border-radius: 4px 12px 12px 12px;
    align-self: flex-start;
  }

  .msg.user {
    background: var(--text-primary);
    color: #fff;
    border-radius: 12px 4px 12px 12px;
    align-self: flex-end;
  }

  .msg.typing {
    background: var(--bg);
    align-self: flex-start;
    border-radius: 4px 12px 12px 12px;
    padding: 12px 16px;
  }

  .typing-dots { display: flex; gap: 4px; align-items: center; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-tertiary);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .chat-input-area {
    padding: 12px 16px;
    border-top: 0.5px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .chat-input {
    flex: 1;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-strong);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }

  .chat-input:focus { border-color: rgba(0,0,0,0.3); }
  .chat-input::placeholder { color: var(--text-tertiary); }

  .chat-send {
    width: 38px; height: 38px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--text-primary);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .chat-send:hover { opacity: 0.8; }
  .chat-send:disabled { opacity: 0.3; cursor: default; }

  .suggestions {
    padding: 0 16px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .suggestion {
    padding: 5px 11px;
    border-radius: 20px;
    border: 0.5px solid var(--border-strong);
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.12s;
  }

  .suggestion:hover { background: var(--bg); }

  /* ── SCHEDULE CARD ── */
  .schedule-card { padding: 20px 24px; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

  .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }

  .tab {
    padding: 5px 13px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-strong);
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: transparent; color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    transition: background 0.12s, color 0.12s;
  }

  .tab:hover { background: var(--bg); }
  .tab.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

  .table-label {
    font-size: 12px; color: var(--text-tertiary);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }

  .franco-badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; background: #F4F1EC; color: var(--text-secondary);
    border: 0.5px solid var(--border-strong);
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  thead th {
    text-align: left; padding: 6px 8px;
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-tertiary);
    border-bottom: 0.5px solid var(--border);
  }

  tbody td { padding: 6px 8px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr.current td { background: #F4F1EC; }

  .time-cell {
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--text-secondary); white-space: nowrap; width: 56px;
  }

  .now-indicator {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #1A1A18; margin-left: 4px; vertical-align: middle;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .pill {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 12px; font-weight: 500; margin: 2px 2px 2px 0;
  }

  .empty { color: var(--text-tertiary); }

  /* API KEY SETUP */
  .apikey-bar {
    max-width: 680px; margin: 0 auto 16px;
    background: #fff8ed;
    border: 0.5px solid rgba(186,117,23,0.3);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }

  .apikey-bar label { font-size: 13px; color: #633806; font-weight: 500; white-space: nowrap; }

  .apikey-input {
    flex: 1; min-width: 180px;
    padding: 7px 11px; border-radius: var(--radius-sm);
    border: 0.5px solid rgba(186,117,23,0.4);
    font-family: 'DM Mono', monospace; font-size: 12px;
    background: #fff; color: var(--text-primary); outline: none;
  }

  .apikey-btn {
    padding: 7px 14px; border-radius: var(--radius-sm);
    border: none; background: #633806; color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; white-space: nowrap;
  }

  .apikey-btn:hover { opacity: 0.85; }
  .apikey-ok { font-size: 12px; color: #3B6D11; }

  @media (max-width: 480px) {
    body { padding: 16px 12px 40px; }
    .now-card, .schedule-card { padding: 16px; }
    .avatar-circle { width: 48px; height: 48px; font-size: 14px; }
    .chat-messages { height: 200px; }
  }
</style>
</head>

<script>
// ── DATA ──────────────────────────────────────────────

  Martes:    {'07:30':['Jose'],'08:30':['Jose'],'09:30':['Jose'],'10:30':['Jose'],'11:30':['Jose'],'12:30':['Jose'],'13:30':['Jose'],'14:30':['Jose'],'15:30':['Jose'],'16:30':['Yane','Dani'],'17:30':['Yane','Dani'],'18:30':['Yane','Dani'],'19:30':['Yane','Dani'],'20:30':['Yane','Dani'],'21:30':['Yane','Dani'],'22:30':['Yane','Dani'],'23:30':['Yane','Dani']},
  Miercoles: {'07:30':['Isa'],'08:30':['Isa'],'09:30':['Isa'],'10:30':['Isa'],'11:30':['Isa'],'12:30':['Isa'],'13:30':['Isa'],'14:30':['Isa'],'15:30':['Isa'],'16:30':['Jose','Dani'],'17:30':['Jose','Dani'],'18:30':['Jose','Dani'],'19:30':['Jose','Dani'],'20:30':['Jose','Dani'],'21:30':['Jose','Dani'],'22:30':['Jose','Dani'],'23:30':['Jose','Dani']},

// ── SCHEDULE HELPERS ──────────────────────────────────
function slotMins(slot) {
  const [h, m] = slot.split(':').map(Number);
  return (h === 0 ? 1440 : h * 60) + m;
}

function getCurrentSlot(h, m) {
  const now = (h === 0 ? 1440 : h * 60) + m;
  let best = null;
  for (const s of SLOTS) { if (slotMins(s) <= now) best = s; }
  return best;
}

function getNow() {
  const d = new Date();
  const h = d.getHours(), m = d.getMinutes();
  const pad = n => String(n).padStart(2,'0');
  return { dayName: JS_DAYS[d.getDay()], h, m, timeStr: `${pad(h)}:${pad(m)}` };
}

function pill(name) {
  const c = COLORS[name] || { bg:'#D3D1C7', text:'#2C2C2A' };
  return `<span class="pill" style="background:${c.bg};color:${c.text}">${name}</span>`;
}

function avatar(name) {
  const c = COLORS[name] || { bg:'#D3D1C7', text:'#2C2C2A' };
  return `<div class="avatar"><div class="avatar-circle" style="background:${c.bg};color:${c.text}">${name.slice(0,2).toUpperCase()}</div><div class="avatar-name">${name}</div></div>`;
}

// ── RENDER NOW ─────────────────────────────────────────
function renderNow() {
  const { dayName, h, m, timeStr } = getNow();
  document.getElementById('now-time').textContent = `${DAY_LABELS[dayName] || dayName} ${timeStr}`;
  const slot = getCurrentSlot(h, m);
  const all = slot ? ((RAW[dayName] || {})[slot] || []) : [];
  const franco = FRANCO[dayName];
  const active = all.filter(p => p !== franco);
  document.getElementById('now-people').innerHTML = active.length === 0
    ? `<span class="now-empty">Nadie en turno en este momento</span>`
    : active.map(avatar).join('');
}

// ── RENDER SCHEDULE ────────────────────────────────────
function renderLegend() {
  document.getElementById('legend').innerHTML = Object.entries(COLORS).map(([n,c]) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${c.bg}"></div>${n}</div>`
  ).join('');
}

function renderTabs(sel) {
  document.getElementById('tabs').innerHTML = DAY_ORDER.map(d =>
    `<button class="tab ${d===sel?'active':''}" onclick="selectDay('${d}')">${DAY_LABELS[d]}</button>`
  ).join('');
}

function renderTable(dayName) {
  const { dayName: today, h, m } = getNow();
  const currentSlot = dayName === today ? getCurrentSlot(h, m) : null;
  const franco = FRANCO[dayName];
  let lbl = DAY_LABELS[dayName];
  if (franco) lbl += ` <span class="franco-badge">Franco: ${franco}</span>`;
  document.getElementById('table-label').innerHTML = lbl;

  document.getElementById('tbody').innerHTML = SLOTS.map(slot => {
    const people = (RAW[dayName] || {})[slot] || [];
    const isCurrent = slot === currentSlot;
    const timeCell = isCurrent
      ? `<td class="time-cell">${slot}<span class="now-indicator"></span></td>`
      : `<td class="time-cell">${slot}</td>`;
    const peopleCells = people.length === 0
      ? `<td class="empty">—</td>`
      : `<td>${people.map(pill).join('')}</td>`;
    return `<tr class="${isCurrent?'current':''}">${timeCell}${peopleCells}</tr>`;
  }).join('');
}

let selectedDay = getNow().dayName;
if (!RAW[selectedDay]) selectedDay = 'Lunes';

function selectDay(day) {
  selectedDay = day;
  renderTabs(day);
  renderTable(day);
}

function tick() { renderNow(); renderTable(selectedDay); }

const chatHistory = [];

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  const container = document.getElementById('chat-messages');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  const container = document.getElementById('chat-messages');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  document.getElementById('chat-send').disabled = true;

  addMsg(text, 'user');
  chatHistory.push({ role: 'user', content: text });

  addTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        max_tokens: 400,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...chatHistory
        ]
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.error) {
      addMsg('Error: ' + data.error.message, 'bot');
    } else {
      const reply = data.choices[0].message.content;
      addMsg(reply, 'bot');
      chatHistory.push({ role: 'assistant', content: reply });
    }
  } catch (e) {
    removeTyping();
    addMsg('No pude conectarme. Revisá tu API key o la conexión.', 'bot');
  }

  document.getElementById('chat-send').disabled = false;
  input.focus();
}

function askSuggestion(btn) {
  document.getElementById('chat-input').value = btn.textContent;
  sendMsg();
}

renderTabs(selectedDay);
tick();
setInterval(tick, 30000);
</script>
